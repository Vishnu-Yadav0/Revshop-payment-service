spring.application.name=payment-service
server.port=8085
spring.profiles.active=local

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/revshop_payments?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true


spring.config.import=optional:configserver:http://localhost:8888

# Razorpay Test Credentials
razorpay.key.id=rzp_test_SN3NFchLw7eXEa
razorpay.key.secret=87PVTalJ3Pdkbv7UI0VtYWjc

# Zipkin / Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.enabled=true
management.endpoints.web.exposure.include=*
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Config Client Timeout (Avoid Hangups)
spring.cloud.config.request-connect-timeout=5000
spring.cloud.config.request-read-timeout=5000
